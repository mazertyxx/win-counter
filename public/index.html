<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Win Counter Overlay</title>

  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #wins {
      font-size: 80px;
      font-weight: bold;
      position: absolute;
      top: 50px;
      left: 50px;
      color: white;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
      transition: color 0.3s ease;
    }
  </style>
</head>

<body>

<div id="wins">WIN : 0 / 100</div>

<script>
async function update() {
  try {
    const res = await fetch("/wins");
    const data = await res.json();

    const wins = data.wins;
    const goal = data.goal;

    const el = document.getElementById("wins");

    el.innerText = `WIN : ${wins} / ${goal}`;

    // 🎨 Couleurs dynamiques
    if (wins === 0) {
      el.style.color = "white";
    } 
    else if (wins > 0) {
      el.style.color = "green";
    } 
    else {
      el.style.color = "red";
    }

  } catch (err) {
    console.log("Erreur API", err);
  }
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
