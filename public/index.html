<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #wins {
      font-size: 80px;
      font-weight: bold;
      position: absolute;
      top: 50px;
      left: 50px;
      transition: color 0.3s ease;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
    }
  </style>
</head>

<body>

<div id="wins">WIN : 0</div>

<script>
let lastValue = 0;

async function update() {
  const res = await fetch("/wins");
  const data = await res.json();

  const value = data.wins;
  const el = document.getElementById("wins");

  el.innerText = "WIN : " + value;

  // 🎨 Couleurs dynamiques
  if (value === 0) {
    el.style.color = "white";
  } 
  else if (value > 0) {
    el.style.color = "green";
  } 
  else {
    el.style.color = "red";
  }

  lastValue = value;
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
