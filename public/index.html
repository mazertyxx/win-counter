<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Win Counter HUD</title>

  <style>
    body {
      margin: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial;
    }

    #container {
      position: absolute;
      top: 50px;
      left: 50px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
    }

    #wins {
      font-size: 80px;
      font-weight: bold;
      color: white;
      transition: color 0.3s ease;
    }

    #mult {
      font-size: 28px;
      margin-top: 10px;
      color: transparent;
      transition: color 0.3s ease;
    }
  </style>
</head>

<body>

<div id="container">
  <div id="wins">WIN : 0 / 100</div>
  <div id="mult"></div>
</div>

<script>
function formatTime(ms) {
  if (ms <= 0) return "0:00";
  const sec = Math.floor(ms / 1000);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2, "0")}`;
}

async function update() {
  const res = await fetch("/wins");
  const data = await res.json();

  const wins = data.wins;
  const goal = data.goal;
  const mult = data.multiplier;
  const end = data.multiplierEnd;

  const winEl = document.getElementById("wins");
  const multEl = document.getElementById("mult");

  // 🎯 WIN DISPLAY
  winEl.innerText = `WIN : ${wins} / ${goal}`;

  if (wins === 0) {
    winEl.style.color = "white";
  } else if (wins > 0) {
    winEl.style.color = "green";
  } else {
    winEl.style.color = "red";
  }

  // 💥 MULTIPLIER DISPLAY
  const now = Date.now();

  if (mult > 1 && end > now) {
    const remaining = end - now;

    multEl.innerText = `x${mult} ACTIVE - ${formatTime(remaining)}`;
    multEl.style.color = "#ffb300"; // jaune orangé
  } else {
    multEl.innerText = "";
  }
}

setInterval(update, 1000);
update();
</script>

</body>
</html>
